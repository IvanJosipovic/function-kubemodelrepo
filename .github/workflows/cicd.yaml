name: CICD

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'alpha'
      - 'beta'
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:

permissions:
  id-token: write
  contents: write
  actions: write
  checks: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  build-test:
    name: Build & Test & Release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Semantic Release Dry Run
      uses: cycjimmy/semantic-release-action@v6.0.0
      id: semantic
      with:
        dry_run: true
        extra_plugins: |
          conventional-changelog-conventionalcommits@9
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: .NET Build
      run: dotnet build -c Release -p:Version=${{ (steps.semantic.outputs.new_release_published && steps.semantic.outputs.new_release_version) || '0.0.1' }}

    - name: .NET Test
      run: dotnet test -- --report-xunit-trx --report-xunit-trx-filename test-results.trx --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml

    - name: Coverage
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.cobertura.xml
        fail_ci_if_error: true

    - name: Test Report
      uses: dorny/test-reporter@v3
      if: success() || failure()
      with:
        name: Tests
        path: '**/TestResults/test-results.trx'
        reporter: dotnet-trx

    - name: Docker Buildx
      run: docker buildx build --platform linux/amd64,linux/arm64 -t test.loc/function-test --build-arg VERSION=${{ (steps.semantic.outputs.new_release_published && steps.semantic.outputs.new_release_version) || '0.0.1' }} src/Function

    - name: Load Docker Image
      run: docker buildx build --load --platform $(docker info --format '{{.Architecture}}') -t test.loc/function-test src/Function

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'test.loc/function-test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
      env:
        TRIVY_DISABLE_VEX_NOTICE: true

    - name: Semantic Release
      if: steps.semantic.outputs.new_release_published == 'true'
      uses: cycjimmy/semantic-release-action@v6.0.0
      id: semantic-final
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        extra_plugins: |
          conventional-changelog-conventionalcommits@9

    - name: Install Crossplane CLI
      if: steps.semantic-final.outputs.new_release_published == 'true'
      run: |
        curl -sfL "https://cli.crossplane.io/install.sh" | sh
        mv crossplane /usr/local/bin

    - name: Build & Push Package
      if: steps.semantic-final.outputs.new_release_published == 'true'
      run: |
        cp src/Function/xrd.yaml package-configuration/apis/kubemodelrepo/definition.yaml

        version="${{ steps.semantic-final.outputs.new_release_version }}"
        if [ -n "$version" ]; then
          sed -Ei 's/^([[:space:]]*version:[[:space:]]*")[^"]*(")/\1'">=$version"'\2/' package-configuration/crossplane.yaml
        fi

        cat package-configuration/crossplane.yaml

        crossplane xpkg build --package-root="package-configuration" --examples-root="examples" -o image.tar
        img=$(docker load -i image.tar | sed -n 's/^Loaded image: //p; s/^Loaded image ID: //p')
        docker tag "$img" "ghcr.io/${GITHUB_REPOSITORY,,}/configuration-kubemodelrepo:${version}"

        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${GITHUB_ACTOR} --password-stdin
        docker push "ghcr.io/${GITHUB_REPOSITORY,,}/configuration-kubemodelrepo:${version}"

    - name: Push Function
      if: steps.semantic-final.outputs.new_release_published == 'true'
      run: |
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${GITHUB_ACTOR} --password-stdin

        docker buildx build --push --platform linux/amd64,linux/arm64 -t ghcr.io/${GITHUB_REPOSITORY,,}/function-kubemodelrepo:${{ github.ref_name == 'main' && 'latest' || github.ref_name == 'alpha' && 'alpha' || github.ref_name == 'beta' && 'beta' }} -t ghcr.io/${GITHUB_REPOSITORY,,}/function-kubemodelrepo:${{ steps.semantic-final.outputs.new_release_version }} --build-arg VERSION=${{ steps.semantic-final.outputs.new_release_version }} src/Function
